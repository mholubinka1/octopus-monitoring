name: Docker Build/Publish Image - ARMv7

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - 'main'

jobs:
  ARM64_App_Image_Build_and_Push:
    runs-on: [ARM64]
    permissions:
      contents: write
    env:
      DOCKER_REGISTRY: docker.io
      DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/octopus-monitoring
      DOCKER_TARGET_PLATFORM: linux/arm/arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Set up Python
        if: success()
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        if: success()
        run: pip install poetry

      - name: Install dependencies
        if: success()
        run: poetry install --no-root

      - name: Run tests
        if: success()
        shell: bash
        run: |
          BASELINE=$(cat .github/coverage-baseline.txt)
          poetry run pytest --cov=app --cov-report=term-missing --cov-report=json:coverage.json --cov-fail-under="$BASELINE"

      - name: Raise coverage baseline
        if: success() && github.event_name == 'push'
        shell: bash
        run: |
          BASELINE=$(cat .github/coverage-baseline.txt)
          ACTUAL=$(poetry run python -c "import json; print(int(json.load(open('coverage.json'))['totals']['percent_covered']))")
          if [ "$ACTUAL" -gt "$BASELINE" ]; then
            echo "$ACTUAL" > .github/coverage-baseline.txt
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .github/coverage-baseline.txt
            git commit -m "Raise coverage baseline to ${ACTUAL}% [skip ci]"
            git push
          else
            echo "Coverage unchanged at ${ACTUAL}%, baseline stays at ${BASELINE}%."
          fi

      - name: Prepare
        if: success()
        id: prepare
        run: |
          echo "docker_platform=${DOCKER_TARGET_PLATFORM}" >> $GITHUB_OUTPUT
          echo "docker_image=${DOCKER_REGISTRY}/${DOCKER_IMAGE}" >> $GITHUB_OUTPUT
          echo "version=${GITHUB_RUN_NUMBER}" >> $GITHUB_OUTPUT

      - name: Docker info
        run: |
          docker version
          docker info
          docker ps

      - name: Docker Login
        if: success()
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Get Docker Image Tag
        if: success()
        id: tag
        shell: bash
        run: |
          branchName=${{ github.ref_name }}
          if [ $branchName != 'main' ]; then image_tag='dev'; else image_tag='latest'; fi
          echo "tag=$(echo $image_tag)" >> $GITHUB_OUTPUT

      - name: Docker Build and Push
        uses: docker/build-push-action@v4
        with:
          push: true
          tags: ${{ steps.prepare.outputs.docker_image }}:${{ steps.tag.outputs.tag }}
